<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Modern pink gradient with layered background texture */
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Modern Sparkling Background Decoration */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: radial-gradient(#ffb6c1 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.3;
            animation: backgroundMove 60s linear infinite;
        }

        @keyframes backgroundMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50%, -50%); }
        }

        /* Floating Decoration Objects */
        .decoration {
            position: absolute;
            pointer-events: none;
            user-select: none;
            opacity: 0.6;
            filter: blur(1px);
        }

        /* Modern Neumorphic UI Styling with Depth */
        #login-screen, #main-content {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            /* Modern soft layered shadows for depth */
            box-shadow: 
                0 10px 20px rgba(0,0,0,0.05),
                0 6px 6px rgba(0,0,0,0.05),
                inset 0 -5px 15px rgba(219, 112, 147, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            z-index: 10;
            min-width: 320px;
            position: relative;
        }

        #main-content { display: none; animation: fadeInUI 0.8s ease-out; }

        @keyframes fadeInUI { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        h2 { color: #db7093; margin: 0 0 20px 0; font-size: 1.8rem; text-shadow: 0 2px 3px rgba(0,0,0,0.1); }
        h1 { color: #b03060; margin: 25px 0; font-size: 1.6rem; line-height: 1.4; text-shadow: 0 2px 3px rgba(0,0,0,0.1); }

        #pin-input {
            padding: 15px;
            font-size: 2.2rem;
            width: 160px;
            text-align: center;
            border: none;
            border-radius: 15px;
            background: #fdfdfd;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1), 0 1px 1px rgba(255,255,255,0.8);
            color: #db7093;
            outline: none;
            letter-spacing: 8px;
            transition: box-shadow 0.3s;
        }
        #pin-input:focus {
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1), 0 0 10px rgba(255, 133, 162, 0.3);
        }

        #error-msg { color: #ff4d6d; display: none; margin-top: 15px; font-weight: bold; animation: shake 0.5s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }

        /* DEEP CSS BUNNY (Multi-layered Depth) */
        .bunny-container {
            position: relative;
            width: 170px;
            height: 170px;
            margin: 0 auto;
            perspective: 1000px;
        }

        .bunny {
            position: absolute;
            width: 100%;
            height: 100%;
            /* Gradient for soft 3D shading */
            background: radial-gradient(circle at 50% 40%, #ffffff 0%, #f0f0f0 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            /* Complex shadow for grounding and lift */
            box-shadow: 
                0 10px 20px rgba(0,0,0,0.1),
                inset 0 -10px 15px rgba(0,0,0,0.05),
                inset 0 10px 15px rgba(255,255,255,1);
            transform-style: preserve-3d;
            animation: bunnyFloat 4s ease-in-infinite alternate;
        }

        @keyframes bunnyFloat { from { transform: translateY(0); } to { transform: translateY(-5px); } }

        /* Layers within the bunny (Ears, Face, Cheeks) */
        .bunny::before, .bunny::after {
            content: '';
            position: absolute;
            top: -50px;
            width: 35px;
            height: 90px;
            background: #fff;
            border-radius: 50%;
            /* Ear shading for depth */
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.05);
            z-index: -1;
        }
        .bunny::before { left: 40px; transform: rotate(-10deg) translateZ(-1px); }
        .bunny::after { right: 40px; transform: rotate(10deg) translateZ(-1px); }

        /* Inner Ear Pink (Adds detail) */
        .bunny-inner-ear {
            position: absolute;
            top: -35px;
            width: 15px;
            height: 60px;
            background: #ffb6c1;
            border-radius: 50%;
            opacity: 0.7;
            filter: blur(1px);
        }
        .inner-left { left: 50px; transform: rotate(-10deg); }
        .inner-right { right: 50px; transform: rotate(10deg); }

        .face-details {
            position: absolute;
            top: 65px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 45px;
            z-index: 2;
        }
        .eye { width: 12px; height: 12px; background: #333; border-radius: 50%; box-shadow: inset 0 2px 2px rgba(0,0,0,0.5); }
        .nose {
            position: absolute;
            top: 18px;
            width: 15px;
            height: 10px;
            background: radial-gradient(circle at 50% 30%, #ffc0cb 0%, #db7093 100%);
            border-radius: 50%;
            box-shadow: 0 2px 3px rgba(0,0,0,0.1);
        }
        /* Rosy Cheeks (Adds cute depth) */
        .cheeks {
            position: absolute;
            top: 75px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 70px;
            opacity: 0.5;
            filter: blur(3px);
            z-index: 1;
        }
        .cheek { width: 25px; height: 15px; background: #ffb6c1; border-radius: 50%; }

        /* Button Styling */
        .buttons { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }

        button {
            padding: 15px 45px;
            font-size: 1.25rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }
        button:hover::after { left: 100%; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 3px rgba(0,0,0,0.1); }

        #yes-btn {
            background: linear-gradient(135deg, #ff4d6d 0%, #db7093 100%);
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        #yes-btn:hover { background: linear-gradient(135deg, #db7093 0%, #ff4d6d 100%); }

        #no-btn {
            background: linear-gradient(135deg, #d3d3d3 0%, #a0a0a0 100%);
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        #no-btn:hover { background: linear-gradient(135deg, #a0a0a0 0%, #d3d3d3 100%); }

    </style>
</head>
<body>

    <div class="decoration" style="top: 10%; left: 15%; font-size: 30px;">❤️</div>
    <div class="decoration" style="top: 70%; left: 5%; font-size: 25px;">💗</div>
    <div class="decoration" style="top: 20%; left: 80%; font-size: 35px;">🫀</div>
    <div class="decoration" style="top: 80%; left: 85%; font-size: 20px;">🫠</div>
    <div class="decoration" style="top: 50%; left: 90%; font-size: 28px;">😺</div>

    <audio id="yes-sound" src="https://www.myinstants.com/media/sounds/goofy-ahhhhh-run.mp3"></audio>
    <audio id="no-sound" src="https://www.myinstants.com/media/sounds/sad-meow-short-version.mp3"></audio>

    <form id="response-form" action="https://formspree.io/f/mnjleroq" method="POST" style="display:none;">
        <input type="text" name="Response" id="answer-field">
    </form>

    <div id="login-screen">
        <h2>Enter Secret PIN</h2>
        <input type="password" id="pin-input" maxlength="4" placeholder="****" autofocus autocomplete="off">
        <p id="error-msg">Incorrect PIN!</p>
    </div>

    <div id="main-content">
        <div class="bunny-container">
            <div class="bunny">
                <div class="bunny-inner-ear inner-left"></div>
                <div class="bunny-inner-ear inner-right"></div>
                <div class="cheeks">
                    <div class="cheek"></div>
                    <div class="cheek"></div>
                </div>
                <div class="face-details">
                    <div class="eye"></div>
                    <div class="nose"></div>
                    <div class="eye"></div>
                </div>
            </div>
        </div>
        <h1 id="headline">Will you be in a relationship with me?</h1>
        <div class="buttons" id="btn-group">
            <button id="yes-btn" onclick="sendAnswer('Yes')">Yes!</button>
            <button id="no-btn" onclick="sendAnswer('No')">No</button>
        </div>
    </div>

    <script>
        const pinInput = document.getElementById('pin-input');
        const loginScreen = document.getElementById('login-screen');
        const mainContent = document.getElementById('main-content');
        const errorMsg = document.getElementById('error-msg');
        const yesSound = document.getElementById('yes-sound');
        const noSound = document.getElementById('no-sound');

        // PIN Logic
        pinInput.addEventListener('input', (e) => {
            errorMsg.style.display = 'none';
            if (e.target.value === '1401') {
                loginScreen.style.display = 'none';
                mainContent.style.display = 'block';
            } else if (e.target.value.length === 4) {
                errorMsg.style.display = 'block';
                pinInput.value = '';
                // Focus back on input to shake again if wrong
                setTimeout(() => pinInput.focus(), 100);
            }
        });

        // Answer Submission
        function sendAnswer(answer) {
            const form = document.getElementById('response-form');
            document.getElementById('answer-field').value = answer;

            // AJAX submit so page doesn't refresh
            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            });

            if (answer === 'Yes') {
                yesSound.play();
                document.getElementById('headline').innerHTML = "love you bbg 💗🫀🫠😼";
                document.getElementById('headline').style.animation = 'fadeInUI 0.5s ease-out';
                document.getElementById('btn-group').style.display = 'none';
                
                // Real Confetti Cannon!
                triggerConfetti();
            } else {
                noSound.currentTime = 0;
                noSound.play();
                alert("The bunny is sad now... are you sure? 🥺");
            }
        }

        // Realistic Confetti Celebration
        function triggerConfetti() {
            var count = 200;
            var defaults = {
                origin: { y: 0.7 }
            };

            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(count * particleRatio)
                }));
            }

            fire(0.25, {
                spread: 26,
                startVelocity: 55,
            });
            fire(0.2, {
                spread: 60,
            });
            fire(0.35, {
                spread: 100,
                decay: 0.91,
                scalar: 0.8
            });
            fire(0.1, {
                spread: 120,
                startVelocity: 25,
                decay: 0.92,
                scalar: 1.2
            });
            fire(0.1, {
                spread: 120,
                startVelocity: 45,
            });
        }
    </script>
</body>
</html>
